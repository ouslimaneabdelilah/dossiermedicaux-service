services:
  dossier_service:
    build:
      context: .
      dockerfile: docker/php/dockerfile
    container_name: dossier_service_container
    volumes:
      - ./:/var/www/html
    depends_on:
      - dossier_db
    expose:
      - "9000"

  dossier_nginx:
    image: nginx:alpine
    container_name: dossier_nginx_container
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - dossier_service

  dossier_db:
    image: mysql:8.0
    container_name: dossier_db_container
    restart: always
    environment:
      MYSQL_DATABASE: dossier_medicaux_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dossier_medicaux
      MYSQL_PASSWORD: dossier_medicaux
    volumes:
      - dossier_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  dossier_db_data:
